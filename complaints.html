<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>عرض الشكاوي - حافلتي</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body {
      margin: 0;
      font-family: "Tajawal", sans-serif;
      background: #f5f7fb;
      color: #0b1b3b;
    }

    /* الهيدر */
    header {
      background:#0b113b;
      padding:14px 0;
      box-shadow:0 0 25px rgba(0,0,0,0.35);
      position:sticky;
      top:0;
      z-index:999;
    }

    .nav {
      max-width:1100px;
      margin:0 auto;
      padding:0 20px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      color:#fff;
    }

    .logo img {
      height:auto;
      width:auto;
      max-height:80px;
      object-fit:contain;
      border-radius:0;
      background:none;
      padding:0;
      box-shadow:none;
    }

    .nav_links {
      display:flex;
      align-items:center;
      gap:20px;
    }

    .nav_links a {
      color:#fff;
      text-decoration:none;
      font-size:15px;
      opacity:0.9;
      transition:0.25s;
    }

    .nav_links a:hover {
      opacity:1;
    }

    .btn-login-nav {
      padding:8px 18px;
      background:#ffc928;
      border:none;
      border-radius:20px;
      font-size:14px;
      font-weight:700;
      color:#0b113b;
      cursor:pointer;
      transition:0.25s;
    }

    .btn-login-nav:hover {
      opacity:0.9;
    }

    /* محتوى الشكاوي */
    .container {
      max-width: 700px;
      margin: 40px auto;
      padding: 20px;
    }

    .card {
      background: white;
      padding: 20px;
      border-radius: 20px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.1);
      margin-bottom: 20px;
      line-height: 1.8;
    }

    .btn-home {
      margin-top: 20px;
      padding: 12px 25px;
      background: #ffc928;
      border: none;
      border-radius: 30px;
      font-size: 16px;
      font-weight: bold;
      color: #0b1b3b;
      cursor: pointer;
      transition: 0.2s;
      display: block;
      width: 200px;
      margin-left: auto;
      margin-right: auto;
    }

    .btn-home:hover {
      transform: scale(1.05);
    }
  </style>
</head>

<body>

  <!-- الهيدر الجديد -->
  <header>
    <div class="nav">

      <div class="logo" onclick="location.href='index.html'">
        <img src="https://raw.githubusercontent.com/mina-wep/mina-wep.github.io/refs/heads/main/WhatsApp%20Image%202026-04-22%20at%202.38.28%20PM.jpeg">
      </div>

      <div class="nav_links">
        <a href="index.html">الصفحة الرئيسية</a>
        <a href="tracking.html">تتبع مباشر</a>
        <a href="routes.html">المسارات</a>
        <a href="register.html">التسجيل</a>
        <a href="support.html">الدعم</a>
        <button onclick="location.href='login.html'" class="btn-login-nav">الدخول</button>
      </div>

    </div>
  </header>

  <div class="container">
    <h2 style="text-align:center;">الشكاوي الواردة</h2>
    <div id="complaintsArea"></div>

    <button class="btn-home" onclick="location.href='index.html'">العودة للصفحة الرئيسية</button>
  </div>

  <script>
    const area = document.getElementById("complaintsArea");
    const list = JSON.parse(localStorage.getItem("complaintsList")) || [];

    if (list.length === 0) {
      area.innerHTML = "<p style='text-align:center; opacity:0.7;'>لا توجد شكاوي حتى الآن</p>";
    } else {
      list.forEach(c => {
        area.innerHTML += `
          <div class="card">
            <strong>الاسم:</strong> ${c.name}<br>
            <strong>البريد:</strong> ${c.email}<br>
            <strong>الباص:</strong> ${c.bus}<br>
            <strong>الرسالة:</strong> ${c.message}<br>
            <strong>التاريخ:</strong> ${c.date}
          </div>
        `;
      });
    }
  </script>

</body>
</html>
