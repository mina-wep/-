<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>تواصل معنا</title>
    <style>
        body {
            font-family: "Tajawal", sans-serif;
            background-color: #f7f9fc;
            margin: 0;
        }
        header {
            background-color: #4a90e2;
            padding: 20px;
            text-align: center;
            color: white;
            font-size: 26px;
        }
        .container {
            width: 60%;
            margin: 40px auto;
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 0 10px #ddd;
        }
        label {
            font-size: 18px;
            margin-top: 10px;
            display: block;
        }
        input, textarea {
            width: 100%;
            padding: 12px;
            margin-top: 5px;
            border-radius: 8px;
            border: 1px solid #ccc;
            font-size: 16px;
        }
        textarea {
            height: 120px;
        }
        button {
            margin-top: 20px;
            width: 100%;
            padding: 14px;
            background-color: #4a90e2;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            cursor: pointer;
        }
        a {
            display: block;
            text-align: center;
            margin-top: 20px;
            color: #4a90e2;
            text-decoration: none;
        }
    </style>
</head>
<body>

<header>تواصل معنا</header>

<div class="container">
    <label>اسمك</label>
    <input type="text">

    <label>البريد الإلكتروني</label>
    <input type="email">

    <label>رسالتك</label>
    <textarea></textarea>

    <button>إرسال</button>

    <a href="index.html">العودة للصفحة الرئيسية</a>
</div>

</body>
</html>
