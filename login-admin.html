<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>تسجيل دخول المشرفة</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body {
      margin: 0;
      font-family: "Tajawal", sans-serif;
      background: #f5f7fb;
      color: #0b1b3b;
      text-align: center;
    }

    .container {
      max-width: 400px;
      margin: 100px auto;
      background: white;
      padding: 30px;
      border-radius: 20px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.1);
    }

    input {
      width: 90%;
      padding: 12px;
      margin: 10px 0;
      border-radius: 10px;
      border: 1px solid #ccc;
      font-size: 16px;
    }

    button {
      margin-top: 20px;
      padding: 12px 25px;
      background: #ffc928;
      border: none;
      border-radius: 30px;
      font-size: 16px;
      font-weight: bold;
      color: #0b1b3b;
      cursor: pointer;
      transition: 0.2s;
      width: 200px;
    }

    button:hover {
      transform: scale(1.05);
    }
  </style>
</head>

<body>

  <div class="container">
    <h2>تسجيل دخول المشرفة</h2>
    <p style="opacity:0.7;">الرجاء إدخال كلمة المرور</p>

    <input type="password" id="adminPass" placeholder="كلمة المرور">

    <button onclick="login()">دخول</button>
  </div>

  <script>
    function login() {
      const pass = document.getElementById("adminPass").value;

      // كلمة المرور الخاصة بالمشرفة
      const correctPass = "12345"; // تقدرين تغيرينها

      if (pass === correctPass) {
        location.href = "complaints.html";
      } else {
        alert("كلمة المرور غير صحيحة");
      }
    }
  </script>

</body>
</html>
